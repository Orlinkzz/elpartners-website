<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>El Partners — Legal & Corporate Service</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy: #0B1829;
    --navy-mid: #122033;
    --navy-light: #1A2F47;
    --navy-soft: #243D57;
    --gold: #C9A84C;
    --gold-light: #E8C97A;
    --gold-pale: #F5E6C0;
    --cream: #FAF7F0;
    --cream-warm: #F2EDE0;
    --white: #FFFFFF;
    --text-muted: #8FA3B8;
    --text-light: #B8CAD9;
    --serif: 'Cormorant Garamond', Georgia, serif;
    --sans: 'Jost', sans-serif;
    --transition: 0.35s cubic-bezier(0.4, 0, 0.2, 1);
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: var(--sans);
    background: var(--navy);
    color: var(--cream);
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--navy); }
  ::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 2px; }

  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 5vw;
    height: 72px;
    background: rgba(11, 24, 41, 0.92);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid rgba(201, 168, 76, 0.15);
    transition: var(--transition);
  }

  .nav-logo {
    display: flex; align-items: center; gap: 14px;
    text-decoration: none;
  }
  .nav-logo-mark {
    width: 44px; height: 44px;
    border: 1.5px solid var(--gold);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--serif);
    font-size: 20px; font-weight: 600;
    color: var(--gold);
    letter-spacing: 1px;
    position: relative;
    flex-shrink: 0;
  }
  .nav-logo-mark::before {
    content: '';
    position: absolute; top: 3px; left: 3px; right: 3px; bottom: 3px;
    border: 0.5px solid rgba(201, 168, 76, 0.3);
  }
  .nav-logo-text { display: flex; flex-direction: column; }
  .nav-logo-name {
    font-family: var(--serif);
    font-size: 18px; font-weight: 600;
    color: var(--cream);
    letter-spacing: 2px;
    line-height: 1;
    text-transform: uppercase;
  }
  .nav-logo-sub {
    font-size: 8px; letter-spacing: 3px; text-transform: uppercase;
    color: var(--gold); font-weight: 500; margin-top: 3px;
  }

  .nav-links { display: flex; align-items: center; gap: 36px; list-style: none; }
  .nav-links a {
    text-decoration: none; font-size: 11px; font-weight: 500;
    letter-spacing: 2px; text-transform: uppercase;
    color: var(--text-light);
    transition: color var(--transition);
    position: relative;
  }
  .nav-links a::after {
    content: ''; position: absolute; bottom: -4px; left: 0; right: 0;
    height: 1px; background: var(--gold);
    transform: scaleX(0); transition: transform var(--transition);
    transform-origin: left;
  }
  .nav-links a:hover { color: var(--gold); }
  .nav-links a:hover::after { transform: scaleX(1); }

  .nav-cta {
    background: transparent;
    border: 1px solid var(--gold);
    color: var(--gold) !important;
    padding: 8px 22px !important;
    letter-spacing: 2px;
    cursor: pointer;
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    text-decoration: none;
    font-family: var(--sans);
    transition: all var(--transition);
    display: inline-block;
  }
  .nav-cta:hover {
    background: var(--gold) !important;
    color: var(--navy) !important;
  }
  .nav-cta::after { display: none !important; }

  .hero {
    min-height: 100vh;
    display: flex; align-items: center;
    padding: 120px 5vw 80px;
    position: relative;
    overflow: hidden;
  }

  .hero-bg {
    position: absolute; inset: 0; z-index: 0;
    background:
      radial-gradient(ellipse 60% 60% at 70% 40%, rgba(201, 168, 76, 0.06) 0%, transparent 60%),
      radial-gradient(ellipse 40% 80% at 90% 80%, rgba(201, 168, 76, 0.04) 0%, transparent 70%),
      var(--navy);
  }

  .hero-grid-lines {
    position: absolute; inset: 0; z-index: 0; opacity: 0.04;
    background-image:
      linear-gradient(rgba(201,168,76,0.8) 1px, transparent 1px),
      linear-gradient(90deg, rgba(201,168,76,0.8) 1px, transparent 1px);
    background-size: 80px 80px;
  }

  .hero-content { position: relative; z-index: 1; max-width: 640px; }

  .hero-badge {
    display: inline-flex; align-items: center; gap: 10px;
    border: 1px solid rgba(201, 168, 76, 0.4);
    padding: 7px 18px;
    margin-bottom: 36px;
    font-size: 9px; letter-spacing: 3px; text-transform: uppercase;
    color: var(--gold); font-weight: 500;
  }
  .hero-badge-dot {
    width: 5px; height: 5px; border-radius: 50%;
    background: var(--gold);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.7); }
  }

  .hero-eyebrow {
    font-family: var(--serif);
    font-size: clamp(13px, 1.2vw, 15px);
    font-style: italic;
    color: var(--gold);
    letter-spacing: 1px;
    margin-bottom: 16px;
    opacity: 0; animation: fadeUp 0.8s 0.2s forwards;
  }

  .hero-title {
    font-family: var(--serif);
    font-size: clamp(44px, 6vw, 80px);
    font-weight: 300;
    line-height: 1.05;
    letter-spacing: -1px;
    color: var(--cream);
    margin-bottom: 24px;
    opacity: 0; animation: fadeUp 0.8s 0.35s forwards;
  }
  .hero-title em { font-style: italic; color: var(--gold-light); }
  .hero-title strong { font-weight: 700; display: block; }

  .hero-desc {
    font-size: 15px; line-height: 1.8; font-weight: 300;
    color: var(--text-light);
    max-width: 480px; margin-bottom: 44px;
    opacity: 0; animation: fadeUp 0.8s 0.5s forwards;
  }

  .hero-tags {
    display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 44px;
    opacity: 0; animation: fadeUp 0.8s 0.65s forwards;
  }
  .hero-tag {
    font-size: 9px; letter-spacing: 2px; text-transform: uppercase; font-weight: 500;
    color: var(--navy); background: var(--gold);
    padding: 6px 14px;
  }

  .hero-actions {
    display: flex; gap: 16px; align-items: center; flex-wrap: wrap;
    opacity: 0; animation: fadeUp 0.8s 0.8s forwards;
  }
  .btn-primary {
    background: var(--gold);
    color: var(--navy);
    border: none; cursor: pointer;
    font-family: var(--sans);
    font-size: 11px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase;
    padding: 16px 36px;
    text-decoration: none; display: inline-block;
    transition: all var(--transition);
    position: relative; overflow: hidden;
  }
  .btn-primary::before {
    content: ''; position: absolute;
    top: 0; left: -100%; width: 100%; height: 100%;
    background: rgba(255,255,255,0.15);
    transition: left 0.4s ease;
  }
  .btn-primary:hover::before { left: 0; }
  .btn-primary:hover { background: var(--gold-light); transform: translateY(-1px); }

  .btn-outline {
    border: 1px solid rgba(201,168,76,0.5);
    color: var(--gold);
    background: transparent; cursor: pointer;
    font-family: var(--sans);
    font-size: 11px; font-weight: 500; letter-spacing: 2px; text-transform: uppercase;
    padding: 16px 32px;
    text-decoration: none; display: inline-block;
    transition: all var(--transition);
  }
  .btn-outline:hover {
    border-color: var(--gold);
    background: rgba(201,168,76,0.08);
  }

  .hero-card {
    position: absolute; right: 5vw; top: 50%;
    transform: translateY(-50%);
    width: 280px;
    background: var(--navy-mid);
    border: 1px solid rgba(201,168,76,0.2);
    padding: 28px;
    opacity: 0; animation: fadeLeft 0.9s 0.9s forwards;
  }
  .hero-card-title {
    font-family: var(--serif); font-size: 11px; font-style: italic;
    color: var(--gold); letter-spacing: 1px; margin-bottom: 20px;
    text-transform: uppercase;
  }
  .hero-stat { margin-bottom: 18px; padding-bottom: 18px; border-bottom: 1px solid rgba(201,168,76,0.1); }
  .hero-stat:last-of-type { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
  .hero-stat-num {
    font-family: var(--serif); font-size: 36px; font-weight: 600;
    color: var(--gold-light); line-height: 1;
  }
  .hero-stat-label {
    font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--text-muted); margin-top: 4px;
  }

  @keyframes fadeUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeLeft { from { opacity: 0; transform: translate(24px, -50%); } to { opacity: 1; transform: translate(0, -50%); } }

  section { padding: 100px 5vw; }

  .section-eyebrow {
    display: flex; align-items: center; gap: 14px;
    font-size: 9px; letter-spacing: 3px; text-transform: uppercase;
    color: var(--gold); font-weight: 500; margin-bottom: 16px;
  }
  .section-eyebrow::before {
    content: ''; display: block; width: 32px; height: 1px; background: var(--gold);
  }
  .section-title {
    font-family: var(--serif);
    font-size: clamp(32px, 3.5vw, 52px);
    font-weight: 300; line-height: 1.1;
    color: var(--cream); margin-bottom: 16px;
  }
  .section-title em { font-style: italic; color: var(--gold-light); }
  .section-desc {
    font-size: 15px; font-weight: 300; line-height: 1.8;
    color: var(--text-light); max-width: 520px;
  }

  #mengapa { background: var(--navy-mid); }

  .why-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 60px;
    margin-top: 60px;
    align-items: start;
  }

  .why-features { list-style: none; margin-top: 40px; }
  .why-feature {
    display: flex; gap: 20px; padding: 24px 0;
    border-bottom: 1px solid rgba(201,168,76,0.1);
    cursor: default;
    transition: padding-left var(--transition);
  }
  .why-feature:hover { padding-left: 8px; }
  .why-feature:first-child { border-top: 1px solid rgba(201,168,76,0.1); }
  .why-feature-icon {
    width: 44px; height: 44px; flex-shrink: 0;
    border: 1px solid rgba(201,168,76,0.25);
    display: flex; align-items: center; justify-content: center;
    color: var(--gold); font-family: var(--serif);
    font-size: 18px; font-weight: 600;
    transition: all var(--transition);
  }
  .why-feature:hover .why-feature-icon {
    background: var(--gold); color: var(--navy);
  }
  .why-feature-body {}
  .why-feature-title {
    font-size: 13px; font-weight: 600; letter-spacing: 1px;
    text-transform: uppercase; color: var(--cream); margin-bottom: 6px;
  }
  .why-feature-desc { font-size: 13px; font-weight: 300; line-height: 1.7; color: var(--text-light); }

  .why-right { position: sticky; top: 100px; }
  .why-visual {
    background: var(--navy-light);
    border: 1px solid rgba(201,168,76,0.15);
    padding: 40px;
    position: relative;
    overflow: hidden;
  }
  .why-visual::before {
    content: '"';
    position: absolute; top: -10px; left: 24px;
    font-family: var(--serif); font-size: 120px;
    color: rgba(201,168,76,0.08); line-height: 1;
    pointer-events: none;
  }
  .why-quote {
    font-family: var(--serif); font-size: 22px; font-style: italic;
    font-weight: 300; line-height: 1.6; color: var(--cream-warm);
    margin-bottom: 24px;
  }
  .why-quote-author {
    font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
    color: var(--gold); font-weight: 500;
  }
  .why-stats {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 1px; background: rgba(201,168,76,0.1);
    margin-top: 32px;
  }
  .why-stat {
    background: var(--navy-mid);
    padding: 24px;
  }
  .why-stat-num {
    font-family: var(--serif); font-size: 40px; font-weight: 700;
    color: var(--gold); line-height: 1;
  }
  .why-stat-label {
    font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--text-muted); margin-top: 6px;
  }

  #layanan { background: var(--navy); }

  .layanan-header {
    display: flex; justify-content: space-between; align-items: flex-end;
    margin-bottom: 56px; gap: 24px; flex-wrap: wrap;
  }

  .layanan-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1px;
    background: rgba(201,168,76,0.1);
  }

  .layanan-card {
    background: var(--navy);
    padding: 36px 32px;
    position: relative; overflow: hidden;
    cursor: default;
    transition: background var(--transition);
  }
  .layanan-card::after {
    content: ''; position: absolute;
    bottom: 0; left: 0; right: 0; height: 2px;
    background: var(--gold);
    transform: scaleX(0); transform-origin: left;
    transition: transform 0.4s ease;
  }
  .layanan-card:hover { background: var(--navy-mid); }
  .layanan-card:hover::after { transform: scaleX(1); }

  .layanan-card-num {
    font-family: var(--serif); font-size: 11px; font-style: italic;
    color: rgba(201,168,76,0.4); letter-spacing: 1px;
    margin-bottom: 20px;
  }
  .layanan-card-icon {
    width: 48px; height: 48px;
    border: 1px solid rgba(201,168,76,0.2);
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 20px;
    transition: all var(--transition);
  }
  .layanan-card:hover .layanan-card-icon {
    border-color: var(--gold);
    background: rgba(201,168,76,0.06);
  }
  .layanan-card-icon svg { width: 22px; height: 22px; color: var(--gold); }

  .layanan-card-title {
    font-size: 13px; font-weight: 600; letter-spacing: 1.5px;
    text-transform: uppercase; color: var(--cream);
    margin-bottom: 10px; line-height: 1.4;
  }
  .layanan-card-desc {
    font-size: 12px; font-weight: 300; line-height: 1.7;
    color: var(--text-muted);
  }

  .spesial-banner {
    margin: 60px 0 0;
    background: linear-gradient(135deg, var(--navy-light) 0%, var(--navy-soft) 100%);
    border: 1px solid rgba(201,168,76,0.25);
    padding: 48px 52px;
    display: flex; align-items: center; justify-content: space-between;
    gap: 32px; flex-wrap: wrap;
    position: relative; overflow: hidden;
  }
  .spesial-banner::before {
    content: '';
    position: absolute; right: -60px; top: -60px;
    width: 240px; height: 240px;
    border-radius: 50%; border: 40px solid rgba(201,168,76,0.05);
    pointer-events: none;
  }
  .spesial-tag {
    display: inline-block;
    font-size: 8px; letter-spacing: 3px; text-transform: uppercase;
    font-weight: 600; color: var(--gold);
    border: 1px solid rgba(201,168,76,0.4); padding: 5px 12px;
    margin-bottom: 14px;
  }
  .spesial-title {
    font-family: var(--serif); font-size: 26px; font-weight: 300;
    line-height: 1.3; color: var(--cream);
  }
  .spesial-title em { font-style: italic; color: var(--gold-light); }
  .spesial-desc {
    font-size: 13px; font-weight: 300; line-height: 1.7;
    color: var(--text-light); margin-top: 10px; max-width: 480px;
  }
  .spesial-actions { display: flex; gap: 12px; align-items: center; flex-shrink: 0; }

  #keunggulan { background: var(--navy-mid); }
  .keunggulan-grid {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px;
    background: rgba(201,168,76,0.08);
    margin-top: 56px;
  }
  .keunggulan-card {
    background: var(--navy-mid); padding: 40px 28px;
    text-align: center;
    transition: background var(--transition);
    cursor: default;
  }
  .keunggulan-card:hover { background: var(--navy-light); }
  .keunggulan-icon {
    width: 60px; height: 60px; margin: 0 auto 20px;
    border: 1px solid rgba(201,168,76,0.2);
    display: flex; align-items: center; justify-content: center;
    transition: all var(--transition);
  }
  .keunggulan-card:hover .keunggulan-icon {
    background: rgba(201,168,76,0.08); border-color: var(--gold);
  }
  .keunggulan-icon svg { width: 26px; height: 26px; color: var(--gold); }
  .keunggulan-title {
    font-size: 12px; font-weight: 600; letter-spacing: 1.5px;
    text-transform: uppercase; color: var(--cream); margin-bottom: 12px;
  }
  .keunggulan-desc {
    font-size: 12px; font-weight: 300; line-height: 1.7; color: var(--text-muted);
  }

  #kontak { background: var(--navy); }
  .kontak-inner {
    display: grid; grid-template-columns: 1fr 1fr; gap: 80px; align-items: start;
    margin-top: 60px;
  }
  .kontak-info { }
  .kontak-item {
    display: flex; align-items: flex-start; gap: 18px;
    margin-bottom: 28px; padding-bottom: 28px;
    border-bottom: 1px solid rgba(201,168,76,0.08);
  }
  .kontak-item:last-child { border-bottom: none; }
  .kontak-item-icon {
    width: 44px; height: 44px; flex-shrink: 0;
    border: 1px solid rgba(201,168,76,0.2);
    display: flex; align-items: center; justify-content: center;
  }
  .kontak-item-icon svg { width: 18px; height: 18px; color: var(--gold); }
  .kontak-item-label {
    font-size: 9px; letter-spacing: 2px; text-transform: uppercase;
    color: var(--gold); font-weight: 500; margin-bottom: 4px;
  }
  .kontak-item-value {
    font-size: 15px; font-weight: 400; color: var(--cream);
  }
  .kontak-item-value a { color: var(--cream); text-decoration: none; }
  .kontak-item-value a:hover { color: var(--gold); }

  .kontak-form {
    background: var(--navy-mid);
    border: 1px solid rgba(201,168,76,0.12);
    padding: 44px 40px;
  }
  .form-title {
    font-family: var(--serif); font-size: 24px; font-style: italic;
    color: var(--cream); margin-bottom: 32px;
  }
  .form-group { margin-bottom: 20px; }
  .form-label {
    display: block; font-size: 9px; letter-spacing: 2px;
    text-transform: uppercase; color: var(--gold); font-weight: 500;
    margin-bottom: 8px;
  }
  .form-control {
    width: 100%; background: rgba(255,255,255,0.04);
    border: 1px solid rgba(201,168,76,0.12);
    color: var(--cream);
    font-family: var(--sans); font-size: 13px; font-weight: 300;
    padding: 12px 16px;
    outline: none;
    transition: border-color var(--transition);
    appearance: none;
    -webkit-appearance: none;
  }
  .form-control:focus { border-color: rgba(201,168,76,0.5); }
  .form-control::placeholder { color: var(--text-muted); }
  textarea.form-control { resize: vertical; min-height: 100px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .form-submit { width: 100%; margin-top: 8px; }

  footer {
    background: var(--navy-mid);
    border-top: 1px solid rgba(201,168,76,0.1);
    padding: 60px 5vw 32px;
  }
  .footer-inner {
    display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 60px;
    padding-bottom: 48px;
    border-bottom: 1px solid rgba(201,168,76,0.08);
    margin-bottom: 32px;
  }
  .footer-brand-name {
    font-family: var(--serif); font-size: 22px; font-weight: 600;
    letter-spacing: 2px; text-transform: uppercase; color: var(--cream);
    margin-bottom: 4px;
  }
  .footer-brand-sub {
    font-size: 9px; letter-spacing: 3px; text-transform: uppercase;
    color: var(--gold); font-weight: 500; margin-bottom: 18px;
  }
  .footer-brand-desc {
    font-size: 13px; font-weight: 300; line-height: 1.7;
    color: var(--text-muted); max-width: 300px;
  }
  .footer-col-title {
    font-size: 9px; letter-spacing: 3px; text-transform: uppercase;
    color: var(--gold); font-weight: 600; margin-bottom: 20px;
  }
  .footer-links { list-style: none; }
  .footer-links li { margin-bottom: 10px; }
  .footer-links a {
    font-size: 13px; font-weight: 300; color: var(--text-muted);
    text-decoration: none; transition: color var(--transition);
  }
  .footer-links a:hover { color: var(--gold); }

  .footer-bottom {
    display: flex; align-items: center; justify-content: space-between;
    gap: 16px; flex-wrap: wrap;
  }
  .footer-tagline {
    font-family: var(--serif); font-size: 15px; font-style: italic;
    color: var(--gold-light);
  }
  .footer-copy {
    font-size: 11px; color: var(--text-muted); font-weight: 300; letter-spacing: 0.5px;
  }

  .gold-divider { width: 60px; height: 1px; background: var(--gold); margin: 20px 0; }
  .gold-divider.center { margin-left: auto; margin-right: auto; }

  .wa-float {
    position: fixed; bottom: 32px; right: 32px; z-index: 999;
    width: 56px; height: 56px;
    background: var(--gold);
    display: flex; align-items: center; justify-content: center;

<script>
// ── Data loading ──
let contentData = {};

async function loadContent() {
  try {
    const res = await fetch('/api/content');
    contentData = await res.json();
    renderAll();
  } catch (err) {
    console.error('Failed to load content:', err);
  }
}

function renderAll() {
  const d = contentData;
  if (!d) return;

  // Hero
  const hero = d.hero;
  document.getElementById('heroContent').innerHTML = `
    <div class="hero-badge">
      <span class="hero-badge-dot"></span>
      ${hero.badge}
    </div>
    <p class="hero-eyebrow">${hero.eyebrow}</p>
    <h1 class="hero-title">${hero.title}</h1>
    <p class="hero-desc">${hero.desc}</p>
    <div class="hero-tags">
      ${hero.tags.map(t => `<span class="hero-tag">${t}</span>`).join('')}
    </div>
    <div class="hero-actions">
      <a href="#kontak" class="btn-primary">${hero.cta_primary}</a>
      <a href="#layanan" class="btn-outline">${hero.cta_secondary}</a>
    </div>
  `;

  document.getElementById('heroCard').innerHTML = `
    <div class="hero-card-title">Rekam Jejak Kami</div>
    ${hero.stats.map(s => `
      <div class="hero-stat">
        <div class="hero-stat-num">${s.value}</div>
        <div class="hero-stat-label">${s.label}</div>
      </div>
    `).join('')}
  `;

  // Mengapa
  const mg = d.mengapa;
  document.getElementById('mengapaLeft').innerHTML = `
    <div class="section-eyebrow reveal">${mg.eyebrow}</div>
    <h2 class="section-title reveal reveal-delay-1">${mg.title}</h2>
    <p class="section-desc reveal reveal-delay-2">${mg.desc}</p>
    <ul class="why-features">
      ${mg.features.map((f, i) => `
        <li class="why-feature reveal reveal-delay-${i + 1}">
          <div class="why-feature-icon">${f.number}</div>
          <div class="why-feature-body">
            <div class="why-feature-title">${f.title}</div>
            <div class="why-feature-desc">${f.desc}</div>
          </div>
        </li>
      `).join('')}
    </ul>
  `;

  document.getElementById('mengapaRight').innerHTML = `
    <div class="why-visual">
      <p class="why-quote">${mg.quote.text}</p>
      <div class="why-quote-author">${mg.quote.author}</div>
      <div class="why-stats">
        ${mg.stats.map(s => `
          <div class="why-stat">
            <div class="why-stat-num">${s.value}</div>
            <div class="why-stat-label">${s.label}</div>
          </div>
        `).join('')}
      </div>
    </div>
  `;

  // Layanan
  const ly = d.layanan;
  document.getElementById('layananHeader').innerHTML = `
    <div>
      <div class="section-eyebrow reveal">${ly.eyebrow}</div>
      <h2 class="section-title reveal reveal-delay-1">${ly.title}</h2>
    </div>
    <a href="#kontak" class="btn-outline reveal reveal-delay-2">Tanya Layanan</a>
  `;

  document.getElementById('layananGrid').innerHTML = ly.items.map((item, i) => `
    <div class="layanan-card reveal ${i === 0 ? '' : i === 1 ? 'reveal-delay-1' : i === 2 ? 'reveal-delay-2' : ''}">
      <div class="layanan-card-num">${item.number}</div>
      <div class="layanan-card-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M19 21V5a2 2 0 0 0-2-2H7a2 2 0 0 0-2 2v16m14 0H5m14 0h2M5 21H3M9 7h1m-1 4h1m4-4h1m-1 4h1M9 15h6"/></svg>
      </div>
      <div class="layanan-card-title">${item.title}</div>
      <div class="layanan-card-desc">${item.desc}</div>
    </div>
  `).join('');

  if (ly.spesial) {
    document.getElementById('spesialBanner').innerHTML = `
      <div>
        <span class="spesial-tag">${ly.spesial.tag}</span>
        <h3 class="spesial-title">${ly.spesial.title}</h3>
        <p class="spesial-desc">${ly.spesial.desc}</p>
      </div>
      <div class="spesial-actions">
        <a href="#kontak" class="btn-primary">${ly.spesial.cta}</a>
      </div>
    `;
  }

  // Keunggulan
  const kg = d.keunggulan;
  document.getElementById('keunggulanHeader').innerHTML = `
    <div class="section-eyebrow reveal" style="justify-content: center;">${kg.eyebrow}</div>
    <h2 class="section-title reveal reveal-delay-1" style="text-align: center;">${kg.title}</h2>
  `;

  document.getElementById('keunggulanGrid').innerHTML = kg.items.map((item, i) => `
    <div class="keunggulan-card reveal ${i === 1 ? 'reveal-delay-1' : i === 2 ? 'reveal-delay-2' : i === 3 ? 'reveal-delay-3' : ''}">
      <div class="keunggulan-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0 1 12 2.944a11.955 11.955 0 0 1-8.618 3.04A12.02 12.02 0 0 0 3 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>
      </div>
      <div class="keunggulan-title">${item.title}</div>
      <div class="keunggulan-desc">${item.desc}</div>
    </div>
  `).join('');

  // Portfolio
  const pf = d.portfolio;
  document.getElementById('portfolioHeader').innerHTML = `
    <div class="section-eyebrow reveal">${pf.eyebrow}</div>
    <h2 class="section-title reveal reveal-delay-1">${pf.title}</h2>
    <p class="section-desc reveal reveal-delay-2">${pf.desc}</p>
  `;

  // Counters
  document.getElementById('counterStrip').innerHTML = pf.counters.map(c => `
    <div class="portfolio-counter">
      <div class="portfolio-counter-num" data-target="${c.target}">0</div>
      <div class="portfolio-counter-label">${c.label}</div>
    </div>
  `).join('');

  // Cases
  document.getElementById('casesGrid').innerHTML = pf.cases.map((c, i) => `
    <div class="portfolio-case reveal ${i === 1 ? 'reveal-delay-1' : i === 2 ? 'reveal-delay-2' : ''}">
      <div class="portfolio-case-check"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg></div>
      <div class="portfolio-case-tag">${c.tag}</div>
      <div class="portfolio-case-company">${c.company}</div>

// ── Scroll reveal ──
let revealObserver;

function reobserveReveal() {
  if (revealObserver) revealObserver.disconnect();
  revealObserver = new IntersectionObserver((entries) => {
    entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
  }, { threshold: 0.12 });
  document.querySelectorAll('.reveal').forEach(el => revealObserver.observe(el));
}

// ── Tab switch ──
function switchTab(tab) {
  document.querySelectorAll('.portfolio-tab').forEach((t, i) => {
    t.classList.toggle('active', ['cases','logos','testimoni'][i] === tab);
  });
  document.querySelectorAll('.portfolio-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-' + tab).classList.add('active');
}

// ── Counters ──
function animateCounter(el) {
  const target = parseInt(el.dataset.target);
  const duration = 1800;
  const step = target / (duration / 16);
  let current = 0;
  const timer = setInterval(() => {
    current = Math.min(current + step, target);
    const label = el.closest('.portfolio-counter').querySelector('.portfolio-counter-label').textContent.toLowerCase();
    el.textContent = Math.floor(current) + (label.includes('%') ? '%' : '+');
    if (current >= target) clearInterval(timer);
  }, 16);
}

let counterObserver;

function setupCounters() {
  if (counterObserver) counterObserver.disconnect();
  counterObserver = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        e.target.querySelectorAll('[data-target]').forEach(animateCounter);
        counterObserver.unobserve(e.target);
      }
    });
  }, { threshold: 0.3 });
  const strip = document.getElementById('counterStrip');
  if (strip) counterObserver.observe(strip);
}

// ── Contact form submit ──
async function handleSubmit() {
  const nama = document.getElementById('nama').value.trim();
  const telp = document.getElementById('telp').value.trim();
  const email = document.getElementById('email').value.trim();
  const layanan = document.getElementById('layananSelect').value;
  const pesan = document.getElementById('pesan').value.trim();
  if (!nama || !telp) { alert('Mohon isi nama dan nomor WhatsApp Anda.'); return; }

  // Save to backend
  try {
    await fetch('/api/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name: nama, phone: telp, email, service: layanan, message: pesan })
    });
  } catch (err) {
    console.error('Failed to save message:', err);
  }

  const text = `Halo El Partners! Saya ${nama} (${telp}) ingin konsultasi mengenai: ${layanan || 'legalitas usaha'}. ${pesan ? 'Pesan: ' + pesan : ''}`;
  window.open('https://wa.me/6283870451358?text=' + encodeURIComponent(text), '_blank');
}
